# NJ Boardgames - Jekyll Config
# https://jekyllrb.com/docs/configuration/

title: NJ Boardgames
description: Community-driven hub for tabletop gamers across New Jersey
url: https://njboardgames.com

# GitHub Pages defaults
markdown: kramdown
highlighter: rouge

# Build settings
permalink: pretty
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - county_template.html

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Sitemap
sitemap:
  filename: sitemap.xml
  lastmod: true
  priorities:
    pages: 0.7
    posts: 0.5
  changefreqs:
    pages: weekly
    posts: weekly
